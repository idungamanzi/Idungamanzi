<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uma Kuyisabelo Sempilo Kulungile</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --deep: #0a0608;
            --crimson: #8b1a2a;
            --blood: #c0392b;
            --rose: #d4848a;
            --pale: #f5e6e0;
            --gold: #c9a96e;
            --mist: rgba(245,230,224,0.06);
        }

        body {
            background: var(--deep);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Cormorant Garamond', serif;
        }

            /* ── Grain overlay ── */
            body::before {
                content: '';
                position: fixed;
                inset: 0;
                background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
                opacity: 0.04;
                pointer-events: none;
                z-index: 100;
            }

        /* ── Bleeding hearts (floating orbs) ── */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            animation: drift linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        .orb-1 {
            width: 420px;
            height: 420px;
            background: radial-gradient(circle, #5a0a1580, transparent 70%);
            top: -10%;
            left: -5%;
            animation-duration: 22s;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 320px;
            height: 320px;
            background: radial-gradient(circle, #2a060a60, transparent 70%);
            bottom: -10%;
            right: -5%;
            animation-duration: 28s;
            animation-delay: -8s;
        }

        .orb-3 {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, #8b1a2a40, transparent 70%);
            top: 50%;
            left: 60%;
            animation-duration: 18s;
            animation-delay: -4s;
        }

        @keyframes drift {
            0% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(30px, -20px) scale(1.05);
            }

            66% {
                transform: translate(-20px, 30px) scale(0.97);
            }

            100% {
                transform: translate(0, 0) scale(1);
            }
        }

        /* ── Falling petals ── */
        .petals-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        /* ── Heart pulse ── */
        .heart-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 2.5rem;
            opacity: 0;
            animation: fadeUp 1.4s ease forwards;
            animation-delay: 0.3s;
        }

        .heart {
            width: 54px;
            height: 54px;
            position: relative;
            animation: heartbeat 2.4s ease-in-out infinite;
        }

            .heart svg {
                width: 100%;
                height: 100%;
            }

        @keyframes heartbeat {
            0%, 100% {
                transform: scale(1);
                filter: drop-shadow(0 0 6px #8b1a2a80);
            }

            14% {
                transform: scale(1.18);
                filter: drop-shadow(0 0 18px #c0392bcc);
            }

            28% {
                transform: scale(1);
            }

            42% {
                transform: scale(1.12);
                filter: drop-shadow(0 0 14px #c0392baa);
            }

            56% {
                transform: scale(1);
            }
        }

        /* ── Decorative line ── */
        .deco-line {
            width: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 1.4rem auto;
            animation: lineExpand 1.2s ease forwards;
            animation-delay: 1.2s;
        }

        @keyframes lineExpand {
            to {
                width: 220px;
            }
        }

        /* ── Main container ── */
        .stage {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 3.5rem 2.5rem;
            max-width: 720px;
        }

        /* ── Headline ── */
        .headline {
            font-family: 'Cinzel', serif;
            font-size: clamp(2rem, 5vw, 3.4rem);
            font-weight: 600;
            letter-spacing: 0.14em;
            color: var(--pale);
            opacity: 0;
            animation: fadeUp 1.4s ease forwards;
            animation-delay: 0.6s;
            line-height: 1.2;
            position: relative;
        }

            .headline .accent {
                display: block;
                color: var(--gold);
                font-size: 0.5em;
                letter-spacing: 0.3em;
                text-transform: uppercase;
                margin-bottom: 0.6rem;
                opacity: 0.8;
            }

        /* ── Sub-text ── */
        .subtext {
            font-size: clamp(1.1rem, 2.5vw, 1.45rem);
            font-weight: 300;
            font-style: italic;
            color: var(--rose);
            line-height: 1.9;
            opacity: 0;
            animation: fadeUp 1.6s ease forwards;
            animation-delay: 1.6s;
            margin-top: 0.6rem;
        }

        /* ── Translation whisper ── */
        .translation {
            margin-top: 2.4rem;
            font-size: clamp(0.78rem, 1.8vw, 0.92rem);
            color: rgba(245,230,224,0.32);
            letter-spacing: 0.08em;
            font-style: normal;
            line-height: 1.8;
            opacity: 0;
            animation: fadeUp 1.6s ease forwards;
            animation-delay: 2.4s;
        }

            .translation strong {
                color: rgba(201,169,110,0.55);
                font-weight: 400;
            }

        /* ── Drip effect on headline ── */
        .headline-wrap {
            position: relative;
            display: inline-block;
        }

        .drip {
            position: absolute;
            bottom: -28px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 28px;
        }

            .drip span {
                display: block;
                width: 2px;
                background: linear-gradient(to bottom, var(--crimson), transparent);
                border-radius: 0 0 4px 4px;
                opacity: 0;
            }

                .drip span:nth-child(1) {
                    height: 18px;
                    animation: drip 3.2s ease-in-out 2.8s infinite;
                }

                .drip span:nth-child(2) {
                    height: 28px;
                    animation: drip 3.2s ease-in-out 3.3s infinite;
                }

                .drip span:nth-child(3) {
                    height: 14px;
                    animation: drip 3.2s ease-in-out 3.0s infinite;
                }

        @keyframes drip {
            0% {
                opacity: 0;
                transform: scaleY(0);
                transform-origin: top;
            }

            30% {
                opacity: 0.9;
                transform: scaleY(1);
            }

            70% {
                opacity: 0.9;
                transform: scaleY(1);
            }

            100% {
                opacity: 0;
                transform: scaleY(0);
            }
        }

        /* ── Shared fade-up ── */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── Bottom sigil ── */
        .sigil {
            margin-top: 3rem;
            opacity: 0;
            animation: fadeUp 1.4s ease forwards;
            animation-delay: 2.8s;
        }

            .sigil svg {
                width: 48px;
                opacity: 0.22;
            }
    </style>
</head>
<body>

    <!-- Ambient orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Falling petals canvas -->
    <canvas class="petals-canvas" id="petals"></canvas>

    <div class="stage">

        <!-- Beating heart -->
        <div class="heart-wrap">
            <div class="heart">
                <svg viewBox="0 0 100 90" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <radialGradient id="hg" cx="50%" cy="40%" r="60%">
                            <stop offset="0%" stop-color="#c0392b" />
                            <stop offset="100%" stop-color="#4a0a12" />
                        </radialGradient>
                    </defs>
                    <path d="M50 85 C50 85 5 52 5 28 C5 14 16 5 28 5 C37 5 45 11 50 18 C55 11 63 5 72 5 C84 5 95 14 95 28 C95 52 50 85 50 85Z" fill="url(#hg)" />
                    <!-- blood drip -->
                    <path d="M50 78 Q51 84 50 90" stroke="#8b1a2a" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6" />
                </svg>
            </div>
        </div>

        <!-- Headline -->
        <div class="headline-wrap">
            <h1 class="headline">
                <span class="accent">IDUNGAMANZI</span>
                Uma Kuyisabelo<br>Sempilo Kulungile.
            </h1>
            <div class="drip">
                <span></span><span></span><span></span>
            </div>
        </div>

        <!-- Gold line -->
        <div class="deco-line"></div>

        <!-- Sub text -->
        <p class="subtext">
            Siyokwamukela ngezinhliziyo zethu<br>
            zigoboza igazi kunjalo,<br>
            sikuthakasele futhi sikubonge<br>
            ngoba kungokwethu.
        </p>

       
        <!-- Sigil -->
        <div class="sigil">
            <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="30" cy="30" r="28" stroke="#c9a96e" stroke-width="0.8" />
                <path d="M30 8 L30 52 M8 30 L52 30" stroke="#c9a96e" stroke-width="0.6" />
                <circle cx="30" cy="30" r="4" fill="#c9a96e" />
                <path d="M30 8 L36 20 L30 16 L24 20 Z" fill="#c9a96e" />
            </svg>
        </div>

    </div>

    <script>
        // ── Falling rose petals ──────────────────────────────────
        const canvas = document.getElementById('petals');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        const COLORS = ['#8b1a2a', '#c0392b', '#d4848a', '#c9a96e', '#f5e6e0'];
        const petals = [];

        class Petal {
            constructor(delayed) {
                this.reset(delayed);
            }
            reset(offscreen = false) {
                this.x = Math.random() * canvas.width;
                this.y = offscreen ? -20 : Math.random() * canvas.height;
                this.r = 3 + Math.random() * 5;
                this.speedY = 0.4 + Math.random() * 0.8;
                this.speedX = (Math.random() - 0.5) * 0.6;
                this.rot = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.03;
                this.alpha = 0.15 + Math.random() * 0.35;
                this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = 0.01 + Math.random() * 0.02;
            }
            update() {
                this.wobble += this.wobbleSpeed;
                this.x += this.speedX + Math.sin(this.wobble) * 0.5;
                this.y += this.speedY;
                this.rot += this.rotSpeed;
                if (this.y > canvas.height + 20) this.reset(true);
            }
            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rot);
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                // Ellipse petal shape
                ctx.ellipse(0, 0, this.r * 0.55, this.r, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        for (let i = 0; i < 55; i++) petals.push(new Petal(false));

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            petals.forEach(p => { p.update(); p.draw(ctx); });
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
